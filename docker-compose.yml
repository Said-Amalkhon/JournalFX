services:
  api:
    build:
      context: ./backend
    container_name: journalfx-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /data/journalfx.db
    volumes:
      - db_data:/data        # SQLite persists here
    networks:
      - internal
    # Not exposed to host — only accessible inside Docker network via Nginx

  nginx:
    image: nginx:1.25-alpine
    container_name: journalfx-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:80"  # Only localhost — host Nginx proxies here
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - api

volumes:
  db_data:

networks:
  internal:
    driver: bridge
