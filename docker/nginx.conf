# Internal reverse proxy: nginx container → api container
upstream journalfx_api {
    server api:4000;   # "api" = container name, resolved by Docker DNS
}

server {
    listen 80;

    location /journalfx {
        proxy_pass         http://journalfx_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        return 404;
    }
}
