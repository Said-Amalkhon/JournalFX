server {
    listen 80;
    server_name api.amalkhon.tech;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.amalkhon.tech;

    ssl_certificate     /etc/letsencrypt/live/api.amalkhon.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.amalkhon.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy /journalfx/* → Node.js backend on port 4000
    location /journalfx {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS headers (handled by Express, but belt-and-suspenders)
        add_header Access-Control-Allow-Origin  "https://journalfx.amalkhon.tech" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Block everything else on this subdomain
    location / {
        return 404;
    }
}
