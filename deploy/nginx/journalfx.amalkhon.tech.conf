server {
    listen 80;
    server_name journalfx.amalkhon.tech;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name journalfx.amalkhon.tech;

    ssl_certificate     /etc/letsencrypt/live/journalfx.amalkhon.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/journalfx.amalkhon.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/journalfx/dist;
    index index.html;

    # Serve frontend — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
